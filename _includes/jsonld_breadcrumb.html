<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ '/' | absolute_url }}"
    }{% if page.categories and page.categories != empty %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.categories.first | capitalize | escape }}",
      "item": "{{ '/categories/' | append: page.categories.first | append: '/' | absolute_url }}"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }{% else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }{% endif %}
  ]
}
</script>
