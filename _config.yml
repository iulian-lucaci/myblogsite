title:              Old Prints about Romania
email:              iulianl2000@gmail.com
description:        Old maps, prints and historical cartography of Romania and Eastern Europe.
author:             Iulian Lucaci
baseurl:            ""
url:                "https://transylvaniadigitalantiques.com"
lang:               en
locale:             en_US
slugify:            ascii
image:              "/img/bg-post.jpg"
logo:               "/img/bg-post.jpg"

# Social Profiles
twitter_username:   SBootstrap
github_username:    StartBootstrap
facebook_username:  StartBootstrap
instagram_username:  
linkedin_username:

newsletter:
  provider: mailchimp # mailchimp or convertkit
  headline: "Subscribe to our newsletter"
  description: "Get the latest posts and updates delivered by email. Confirm your subscription through the provider's double opt-in flow."
  mailchimp_action: "https://transylvaniadigitalantiques.us3.list-manage.com/subscribe/post?u=6505442d33c192f271fad85eb&amp;id=d9994d8bc3&amp;f_id=0089dde0f0" # Example: https://xxxx.usX.list-manage.com/subscribe/post?u=...&id=...
  mailchimp_email_field: "EMAIL"
  mailchimp_first_name_field: "FNAME"
  convertkit_action: "" # Example: https://app.convertkit.com/forms/YOUR_FORM_ID/subscriptions
  convertkit_email_field: "email_address"
  convertkit_first_name_field: "first_name"

# Add your google-analytics ID here to activate google analytics
google_analytics: G-BE289B7HBN # Replace with your GA4 Measurement ID
google_analytics_enabled: true # Set false to disable the manual GA tag when using GTM

# Add your Google Tag Manager container ID here
google_tag_manager: "GTM-PDFS2JSM"

# Google Consent Mode - set false to disable the consent banner
google_consent_mode_enabled: true

# Comments - set false to disable comments on posts
comments_enabled: true

# Google Site Verification is now in _includes/head.html

# Build settings
markdown:           kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-archives
  - jekyll-redirect-from

seo:
  hide_comments: true

pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

jekyll-archives:
  enabled:
    - year
    - month
  layouts:
    year: archive
    month: archive
  permalinks:
    year: /archives/:year/
    month: /archives/:year/:month/

# Tags
collections:
  posts:
    output: true
    permalink: /:categories/:title
    categories:
    - danube
    - transylvania
    - bukovina
    - banat
    - bessarabia
    - dobrogea
    - moldova
    - wallachia
    - europe

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Iulian Lucaci
      image: "/img/bg-post.jpg"