<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  {% seo %}

  <meta name="google-site-verification" content="OIb7ZZzkydJmddvLOh6ibPdXIgHPd-tQ0neGiMiyEH4">
  <meta name="google-site-verification" content="uQ0pkn4KyWI33QEKbj7nrsjKNdoh5BtU0oiCy1g4iZo">

  {% assign seo_image = page.image | default: page.background | default: site.image %}
  {% if seo_image %}
    <meta property="og:image" content="{{ seo_image | absolute_url }}">
    <meta property="og:image:secure_url" content="{{ seo_image | absolute_url }}">
    <meta name="twitter:image" content="{{ seo_image | absolute_url }}">
  {% endif %}

  <link href='https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800' rel='stylesheet' type='text/css'>

  <script src="https://use.fontawesome.com/releases/v5.15.3/js/all.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">

  <link rel="stylesheet" href="{{"/assets/main.css" | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">

  <!-- Google Consent Mode Script (loads before GTM/GA) -->
  <script src="{{ "/assets/consent.js" | relative_url }}"></script>

  <!-- Theme Toggle Script -->
  <script src="{{ "/assets/theme-toggle.js" | relative_url }}"></script>

  {% if site.google_tag_manager %}
  <!-- Google Tag Manager -->
  <script>
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','{{ site.google_tag_manager }}');
  </script>
  <!-- End Google Tag Manager -->
  {% endif %}

</head>
